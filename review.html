<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axel Zeed - Neural Feed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="nav-footer.css">
    <link rel="stylesheet" href="debut.css">
</head>

<body class="d-flex flex-column min-vh-100">
    <axel-navbar></axel-navbar>
    <main class="container my-5 py-4">
        <div class="content-section fade-in">
            <h1 class="section-header glitch-text">Neural_Transmission_Feed</h1>
            <div id="full-wishes-list" class="row g-4 mt-2">
            </div>
        </div>
    </main>
    <axel-footer></axel-footer>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="main.js"></script>
    <script>
        // Separate script for the Review Page to keep main.js clean
        async function loadReviewFeed() {
            const list = document.getElementById('full-wishes-list');
            const { data, error } = await supabase.from('wishes').select('*').order('created_at', { ascending: false });
            if (error) return;

            list.innerHTML = '';
            data.forEach(item => {
                const imgHTML = item.image_url ? `<img src="${item.image_url}" class="img-fluid border-cyan mt-3" style="max-height: 300px; border-radius: 8px;">` : '';
                list.innerHTML += `
                <div class="col-12">
                    <div class="preference-box bg-dark border-cyan p-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <h3 class="h5 text-green mb-0">> SENDER: ${item.name}</h3>
                            <span class="text-muted small">${new Date(item.created_at).toLocaleString()}</span>
                        </div>
                        <p class="mt-3 text-white">${item.message}</p>
                        ${imgHTML}
                    </div>
                </div>`;
            });
        }
        window.onload = loadReviewFeed;
    </script>
</body>

</html>
