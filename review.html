<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axel Zeed - Neural Feed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="nav-footer.css">
    <link rel="stylesheet" href="debut.css">
    <style>
        /* --- REVIEW PAGE SPECIFIC STYLES --- */
        .secure-image-wrapper {
            position: relative;
            cursor: pointer;
            overflow: hidden;
            border-radius: 4px;
        }

        .decrypt-overlay {
            background: rgba(13, 51, 63, 0.9);
            border: 2px dashed var(--accent-red);
            z-index: 2;
            transition: opacity 0.4s ease;
        }

        .secure-image-wrapper:hover .decrypt-overlay {
            background: rgba(13, 51, 63, 0.7);
            border-color: var(--neon-cyan);
        }

        .encrypted-img {
            filter: blur(15px) grayscale(100%);
            transition: filter 0.8s ease;
            max-height: 400px;
            object-fit: contain;
            width: 100%;
        }

        /* When the wrapper is clicked, we add the 'revealed' class */
        .secure-image-wrapper.revealed .decrypt-overlay {
            opacity: 0;
            pointer-events: none;
        }

        .secure-image-wrapper.revealed .encrypted-img {
            filter: blur(0) grayscale(0);
        }

        .view-toggle-btn {
            background: transparent;
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            font-family: 'Conthrax';
            padding: 8px 15px;
            font-size: 0.8rem;
            transition: 0.3s;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
        }

        .view-toggle-btn:hover,
        .view-toggle-btn.active {
            background: var(--neon-cyan);
            color: #000;
        }

        .view-toggle-btn.active {
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        .nav-node-btn {
            background: var(--dark-teal);
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 8px 20px;
            font-family: 'Conthrax';
            transition: 0.3s;
        }

        .nav-node-btn:hover:not(:disabled) {
            background: var(--neon-green);
            color: #000;
        }

        .nav-node-btn:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
        }

        /* Ensure node controls stay inline even on small screens */
        #single-nav-controls {
            flex-wrap: nowrap !important;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
        }

        /* Grouping the center elements to prevent stacking */
        .no-wrap {
            white-space: nowrap;
            display: flex;
            align-items: center;
        }

        /* Stylized input to match image_780e5c.png */
        #node-jump-input {
            border: 1px solid var(--neon-cyan);
            box-shadow: inset 0 0 5px var(--neon-cyan);
            background: #0a0a0c !important;
        }

        /* Red/Cyan Glitch Shadow for the Tracker Text */
        .glitch-text-sm {
            text-shadow: 1px 1px 0px var(--accent-red), -1px -1px 0px var(--neon-cyan);
        }

        /* Hide arrows on number input */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <axel-navbar></axel-navbar>

    <main class="container my-5 py-4">
        <div class="content-section fade-in">
            <h1 class="section-header glitch-text">Neural_Transmission_Feed</h1>

            <div
                class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 pb-3 border-bottom border-cyan">
                <p class="text-cyan mb-3 mb-md-0 small">// Zeryuz Administrator Access</p>

                <div class="d-flex gap-2">
                    <button id="btn-single-view" class="view-toggle-btn "
                        onclick="switchView('single')">SINGLE_NODE</button>
                    <button id="btn-list-view" class="view-toggle-btn active"
                        onclick="switchView('list')">BATCH_LIST</button>
                </div>
            </div>

            <div id="feed-container" class="row g-4 mt-2">
                <div class="col-12 text-center">
                    <p class="text-muted small">// Awaiting data sync...</p>
                </div>
            </div>

            <div id="single-nav-controls"
                class="d-flex flex-row justify-content-between align-items-center mt-4 pt-3 border-top border-cyan gap-2"
                style="display: none !important;">

                <button class="nav-node-btn flex-fill text-start" id="btn-prev" onclick="navigate(-1)"
                    style="clip-path: polygon(0 0, 100% 0, 95% 100%, 0 100%);">
                    << PREV </button>

                        <div class="d-flex align-items-center justify-content-center px-3 gap-2 no-wrap">
                            <span class="text-cyan small glitch-text fw-bold" style="white-space: nowrap;">NODE [</span>
                            <input type="number" id="node-jump-input"
                                class="form-control bg-dark border-cyan text-cyan text-center p-0"
                                style="width: 50px; height: 30px; font-family: 'Conthrax'; font-size: 0.9rem; border-radius: 4px;"
                                onchange="jumpToNode()" min="1">
                            <span id="tracker-total" class="text-cyan small glitch-text fw-bold"
                                style="white-space: nowrap;"> // 0 ]</span>
                        </div>

                        <button class="nav-node-btn flex-fill text-end" id="btn-next" onclick="navigate(1)"
                            style="clip-path: polygon(5% 0, 100% 0, 100% 100%, 0 100%);">
                            NEXT >>
                        </button>
            </div>

        </div>
    </main>

    <axel-footer></axel-footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="main.js"></script>
    <script>
        // --- REVIEW DASHBOARD STATE ---
        let wishesData = [];
        let currentIndex = 0;
        let currentMode = 'single'; // Default fixed to single

        async function initReviewFeed() {
            const container = document.getElementById('feed-container');

            if (!supabaseClient) {
                container.innerHTML = '<p class="text-red text-center w-100">!! DATABASE_CONNECTION_FAILED</p>';
                return;
            }

            // Fetch ascending so older messages are first (Transmission 1 = oldest)
            const { data, error } = await supabaseClient
                .from('wishes')
                .select('*')
                .order('created_at', { ascending: true });

            if (error) {
                console.error("Review Fetch Error:", error);
                container.innerHTML = '<p class="text-red text-center w-100">!! FETCH_ERROR</p>';
                return;
            }

            if (data.length === 0) {
                container.innerHTML = '<p class="text-muted text-center w-100">// Database empty.</p>';
                return;
            }

            wishesData = data;

            // Force start at the FIRST (oldest) message
            currentIndex = 0;

            // Force the UI to sync correctly on first load
            switchView('single');
        }

        function switchView(mode) {
            currentMode = mode;

            // Update button UI
            document.getElementById('btn-single-view').classList.toggle('active', mode === 'single');
            document.getElementById('btn-list-view').classList.toggle('active', mode === 'list');

            // Toggle Navigation Controls
            const navControls = document.getElementById('single-nav-controls');
            if (mode === 'single') {
                navControls.style.setProperty('display', 'flex', 'important');
            } else {
                navControls.style.setProperty('display', 'none', 'important');
            }

            renderCurrentView();
        }

        function navigate(direction) {
            currentIndex += direction;
            validateAndRender();
        }

        function jumpToNode() {
            const inputVal = parseInt(document.getElementById('node-jump-input').value, 10);
            if (!isNaN(inputVal)) {
                // User types 1-based index (e.g. 24), we convert to 0-based array index (23)
                currentIndex = inputVal - 1;
            }
            validateAndRender();
        }

        function validateAndRender() {
            // Boundary checks (so you can't type 999 if there are only 70)
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= wishesData.length) currentIndex = wishesData.length - 1;

            renderCurrentView();
        }

        function generateCardHTML(item, indexNum) {
            const dateObj = new Date(item.created_at);
            const formattedDate = `${dateObj.toLocaleDateString()} [${dateObj.toLocaleTimeString()}]`;

            let imgHTML = '';
            if (item.image_url && item.image_url !== "null") {
                imgHTML = `
                <hr class="border-cyan my-3">
                <div class="secure-image-wrapper mt-3" onclick="this.classList.add('revealed')">
                    <div class="decrypt-overlay position-absolute w-100 h-100 d-flex flex-column justify-content-center align-items-center">
                        <span class="text-red fw-bold mb-2">!! ENCRYPTED_VISUAL_DETECTED !!</span>
                        <span class="text-cyan small border border-cyan p-2">CLICK TO DECRYPT</span>
                    </div>
                    <img src="${item.image_url}" class="encrypted-img border-cyan">
                </div>`;
            }

            return `
            <div class="col-12 fade-in visible">
                <div class="preference-box bg-dark border-green p-4">
                    <div class="d-flex justify-content-between align-items-center border-bottom border-green pb-2 mb-3">
                        <h3 class="h5 text-green mb-0">> SENDER_ID: ${item.name}</h3>
                        <div class="text-end">
                            <span class="d-block text-cyan small fw-bold mb-1">TRANSMISSION_#${indexNum}</span>
                            <span class="text-muted small" style="font-size:0.7rem;">${formattedDate}</span>
                        </div>
                    </div>
                    <p class="mt-3 text-white" style="white-space: pre-wrap; font-size: 1.1rem; line-height: 1.6;">${item.message}</p>
                    ${imgHTML}
                </div>
            </div>`;
        }

        function renderCurrentView() {
            const container = document.getElementById('feed-container');
            container.innerHTML = '';

            if (currentMode === 'single') {
                const actualTransmissionNumber = currentIndex + 1;
                container.innerHTML = generateCardHTML(wishesData[currentIndex], actualTransmissionNumber);

                // Re-sync with the HTML changes
                document.getElementById('node-jump-input').value = actualTransmissionNumber;
                document.getElementById('tracker-total').textContent = ` // ${wishesData.length} ]`;

                document.getElementById('btn-prev').disabled = (currentIndex === 0);
                document.getElementById('btn-next').disabled = (currentIndex === wishesData.length - 1);
            } else {
                // Render all in a list (reversed so newest is on top)
                const reversedData = [...wishesData].reverse();
                reversedData.forEach((item, revIndex) => {
                    const actualNum = wishesData.length - revIndex;
                    container.innerHTML += generateCardHTML(item, actualNum);
                });
            }
        }

        // Run on load
        document.addEventListener('DOMContentLoaded', initReviewFeed);
    </script>
</body>

</html>
