<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axel Zeed - Message Relay</title>
    <link rel="icon" type="image/x-icon" href="Assets/Logo.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="nav-footer.css">
    <link rel="stylesheet" href="debut.css">
    <link href="https://fonts.googleapis.com/css2?family=Nexa:wght@300;700&display=swap" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

    <axel-navbar></axel-navbar>

    <main class="container my-auto py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10 fade-in">
                
                <section class="content-section p-4 p-md-5" style="clip-path: polygon(0 2%, 100% 0, 98% 98%, 2% 100%);">
                    <h1 class="section-header glitch-text text-center mb-5">Neural_Feedback_Relay</h1>
                    
                    <div class="preference-box bg-dark border-cyan p-4 p-md-5">
                        <h2 class="sub-section-header mt-0">TRANSMIT_DATA</h2>
                        <h4 class="mt-2 mb-4 h6 text-muted">If you want to send me something, you can submit it below!</h4>
                        
                        <form id="supabase-wish-form">
                            <div style="display:none;">
                                <label>LEAVE THIS BLANK</label>
                                <input type="text" id="zeryuz-security-trap" value="">
                            </div>

                            <div class="mb-4">
                                <label class="small text-cyan mb-2 fw-bold">SENDER_ID (Name)</label>
                                <input type="text" id="wish-name" class="form-control bg-dark border-cyan text-white p-3" placeholder="Input Identity..." required>
                            </div>
                            
                            <div class="mb-4">
                                <label class="small text-cyan mb-2 fw-bold">DATA_PACKET (Message)</label>
                                <textarea id="wish-message" rows="5" class="form-control bg-dark border-cyan text-white p-3" placeholder="Input Message Content..." required></textarea>
                            </div>
                            
                            <div class="mb-4">
                                <label class="small text-green mb-2 fw-bold">VISUAL_ATTACHMENT (Max 5MB)</label>
                                <input type="file" id="wish-image" class="form-control bg-dark border-green text-white p-2" accept="image/*">
                            </div>
                            
                            <button type="submit" class="btn toggle-iframe-btn w-100 py-3" id="submit-btn" style="font-size: 1.1rem;">UPLOAD_TO_MAINFRAME</button>
                        </form>

                        <div id="status-container" class="mt-4 text-center" style="display:none;">
                            <p id="status-msg" class="small mb-2"></p>
                            
                            <div id="rescue-box" class="bg-dark-teal p-4 border-red text-start mt-4" style="display:none;">
                                <h4 class="h6 text-red glitch-text mb-3">!! TRANSMISSION_FAILED !!</h4>
                                <p class="small text-white mb-3">The Zeryuz database may be at capacity. Your message has been saved below.</p>
                                
                                <label class="small text-green mb-2 fw-bold">// RECOVERED_DATA (Copy to Clipboard)</label>
                                <textarea id="recovered-text" rows="4" class="form-control bg-dark border-green text-white mb-3" readonly></textarea>
                                
                                <button class="btn btn-sm btn-outline-info w-100 mb-3 py-2 fw-bold" onclick="copyRescueText()">COPY_DATA</button>
                                
                                <a href="https://forms.gle/h9pnYHYRGjJ973Jy8" target="_blank" class="btn w-100 py-2" style="background-color: var(--accent-red); color: white; font-family: 'Conthrax'; font-weight: 700;">USE EXTERNAL GOOGLE RELAY</a>
                            </div>
                        </div>

                    </div>
                </section>

            </div>
        </div>
    </main>

    <axel-footer></axel-footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
